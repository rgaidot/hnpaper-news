<!doctype html>
<html lang="fr" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxify</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
      }

      .gradient-text {
        background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      audio::-webkit-media-controls-panel {
        background-color: #f8fafc;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 text-slate-800 min-h-screen relative overflow-x-hidden selection:bg-indigo-100 selection:text-indigo-900"
  >
    <div
      class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none"
    >
      <div
        class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-400/20 blur-[120px]"
      ></div>
      <div
        class="absolute bottom-[-10%] right-[-5%] w-[50%] h-[50%] rounded-full bg-purple-400/20 blur-[120px]"
      ></div>
    </div>

    <div class="max-w-5xl mx-auto py-16 px-6 relative z-10">
      <header class="mb-16 text-center">
        <h1 class="text-5xl font-extrabold tracking-tight mb-4 text-slate-900">
          <span class="gradient-text">Voxify</span>
        </h1>
        <p class="text-lg text-slate-500 max-w-2xl mx-auto font-medium">
          Transformez vos contenu Markdown en audio avec des sous-titres
          synchronisés
        </p>
      </header>

      <main class="flex flex-col gap-8">
        <section class="glass-panel rounded-3xl p-8 relative">
          <div class="flex justify-between items-end mb-4">
            <label
              for="markdown"
              class="block text-sm font-bold text-slate-700 tracking-wide uppercase"
              >Markdown</label
            >
          </div>

          <textarea
            id="markdown"
            rows="10"
            oninput="updateButtonState()"
            class="w-full p-6 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all font-mono text-sm leading-relaxed text-slate-700 shadow-inner resize-y"
            placeholder="Collez votre article Markdown ici..."
          ></textarea>
        </section>

        <div
          class="flex flex-col sm:flex-row gap-4 items-center justify-between px-2"
        >
          <p
            id="status"
            class="text-sm font-medium text-slate-500 h-5 w-full sm:w-auto text-center sm:text-left transition-colors duration-300"
          ></p>

          <div class="flex gap-3 w-full sm:w-auto">
            <button
              onclick="clearText()"
              class="flex-1 sm:flex-none px-5 py-3 rounded-xl font-semibold text-slate-600 hover:bg-slate-200/50 hover:text-slate-900 transition-all duration-200 cursor-pointer"
            >
              Effacer
            </button>
            <button
              onclick="generateTTS()"
              id="btn-generate"
              disabled
              class="flex-1 sm:flex-none relative overflow-hidden bg-slate-900 hover:bg-black text-white px-8 py-3 rounded-xl font-semibold shadow-lg shadow-slate-900/20 hover:shadow-slate-900/30 transition-all duration-300 flex items-center justify-center gap-3 cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed disabled:grayscale-[0.5] group"
            >
              <span id="btn-text">Générer</span>
              <div
                id="btn-spinner"
                class="hidden w-5 h-5 border-2 border-white/20 border-t-white rounded-full animate-spin"
              ></div>
              <svg
                id="btn-icon"
                class="w-5 h-5 text-indigo-300"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M14 5l7 7m0 0l-7 7m7-7H3"
                ></path>
              </svg>
            </button>
          </div>
        </div>

        <div
          id="result-section"
          class="hidden grid md:grid-cols-2 gap-6 opacity-0 transition-all duration-500 transform translate-y-8"
        >
          <div
            class="bg-white rounded-3xl p-8 shadow-xl shadow-indigo-100/50 border border-indigo-50 relative overflow-hidden flex flex-col"
          >
            <div
              class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-purple-500"
            ></div>

            <h2 class="text-lg font-bold mb-6 text-slate-800">Audio</h2>

            <audio id="audio-player" controls class="w-full mb-8"></audio>

            <div class="flex flex-col gap-3 mt-auto">
              <a
                id="download-mp3"
                class="flex items-center justify-between p-4 rounded-2xl bg-indigo-600 hover:bg-indigo-700 text-white font-bold transition-all shadow-md shadow-indigo-200 group"
              >
                <div class="flex items-center gap-3">
                  <div class="p-2 bg-white/20 rounded-lg">
                    <svg
                      class="w-5 h-5"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"
                      ></path>
                    </svg>
                  </div>
                  <span class="text-sm tracking-wide"
                    >Télécharger l'Audio (MP3)</span
                  >
                </div>
                <svg
                  class="w-5 h-5 opacity-50 group-hover:translate-y-1 transition-transform"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
                  ></path>
                </svg>
              </a>

              <a
                id="download-vtt"
                class="flex items-center justify-between p-4 rounded-2xl bg-white border-2 border-slate-200 hover:border-indigo-200 hover:bg-indigo-50 text-slate-700 font-bold transition-all group"
              >
                <div class="flex items-center gap-3">
                  <div
                    class="p-2 bg-slate-100 rounded-lg group-hover:bg-indigo-100 transition-colors"
                  >
                    <svg
                      class="w-5 h-5 text-slate-500 group-hover:text-indigo-500"
                      fill="none"
                      stroke="currentColor"
                      viewBox="0 0 24 24"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
                      ></path>
                    </svg>
                  </div>
                  <span class="text-sm tracking-wide"
                    >Télécharger les Sous-titres (VTT)</span
                  >
                </div>
                <svg
                  class="w-5 h-5 text-slate-300 group-hover:text-indigo-400 group-hover:translate-y-1 transition-transform"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
                  ></path>
                </svg>
              </a>
            </div>
          </div>

          <div
            class="bg-slate-900 rounded-3xl p-8 shadow-lg border border-slate-800 relative group flex flex-col"
          >
            <h3
              class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 flex justify-between items-center"
            >
              VTT
            </h3>

            <div class="relative flex-1">
              <div
                class="absolute top-0 left-0 w-full h-4 bg-gradient-to-b from-slate-900 to-transparent z-10 pointer-events-none"
              ></div>
              <pre
                id="vtt-preview"
                class="text-slate-300 text-[13px] leading-relaxed font-mono h-[300px] overflow-y-auto pb-4 scroll-smooth selection:bg-indigo-500/50 selection:text-white"
                tabindex="0"
              >
Attente de la génération...
                        </pre
              >
              <div
                class="absolute bottom-0 left-0 w-full h-8 bg-gradient-to-t from-slate-900 to-transparent z-10 pointer-events-none"
              ></div>
            </div>
          </div>
        </div>
      </main>

      <footer
        class="mt-20 border-t border-slate-200/60 py-10 flex justify-center items-center"
      >
        <p class="text-slate-400 text-sm font-medium text-center">
          © 2026 Voxify <span class="mx-2 text-slate-300">|</span> by
          <a
            href="https://regis.gaidot.net"
            target="_blank"
            rel="noopener noreferrer"
            class="text-slate-500 hover:text-indigo-600 transition-colors underline decoration-slate-200 underline-offset-4"
            >Regis Gaidot</a
          >
        </p>
      </footer>
    </div>

    <script>
      const markdownEl = document.getElementById("markdown");
      const btnGenerate = document.getElementById("btn-generate");
      const btnText = document.getElementById("btn-text");
      const btnSpinner = document.getElementById("btn-spinner");
      const btnIcon = document.getElementById("btn-icon");
      const statusEl = document.getElementById("status");
      const resultSection = document.getElementById("result-section");
      const audioPlayer = document.getElementById("audio-player");
      const vttPreview = document.getElementById("vtt-preview");
      const downloadMp3 = document.getElementById("download-mp3");
      const downloadVtt = document.getElementById("download-vtt");

      let currentVttText = "";
      let currentCues = [];

      function parseTime(timeStr) {
        const parts = timeStr.split(":");
        let secs = 0;
        if (parts.length === 3) {
          secs += parseInt(parts[0], 10) * 3600;
          secs += parseInt(parts[1], 10) * 60;
          secs += parseFloat(parts[2]);
        }
        return secs;
      }

      function renderVttAndSetupHighlighting(vttText) {
        currentVttText = vttText;
        currentCues = [];

        const blocks = vttText.trim().split(/\n\n+/);
        let html = "";

        blocks.forEach((block, index) => {
          if (index === 0 && block.startsWith("WEBVTT")) {
            html += block + "\n\n";
            return;
          }

          const lines = block.split("\n");
          if (lines.length >= 3) {
            const timeMatch = lines[1].match(
              /(\d{2}:\d{2}:\d{2}\.\d{3}) --> (\d{2}:\d{2}:\d{2}\.\d{3})/,
            );
            if (timeMatch) {
              const start = parseTime(timeMatch[1]);
              const end = parseTime(timeMatch[2]);
              currentCues.push({ id: `cue-${index}`, start, end });

              html += `<span id="cue-${index}" class="inline-block w-full border-l-2 border-transparent pl-2 py-0.5 rounded-r-md">${block}</span>\n\n`;
              return;
            }
          }
          html += block + "\n\n";
        });

        vttPreview.innerHTML = html;
      }

      audioPlayer.addEventListener("timeupdate", () => {
        if (!currentCues.length) return;

        const currentTime = audioPlayer.currentTime;
        let activeCueId = null;

        for (const cue of currentCues) {
          if (currentTime >= cue.start && currentTime <= cue.end) {
            activeCueId = cue.id;
            break;
          }
        }

        currentCues.forEach((cue) => {
          const el = document.getElementById(cue.id);
          if (el) {
            if (cue.id === activeCueId) {
              el.classList.add(
                "text-white",
                "bg-indigo-500/20",
                "border-indigo-400",
              );
              el.classList.remove("border-transparent");

              const container = vttPreview;
              const offsetTop = el.offsetTop - container.offsetTop;

              if (
                offsetTop < container.scrollTop ||
                offsetTop > container.scrollTop + container.clientHeight - 60
              ) {
                container.scrollTo({
                  top: Math.max(0, offsetTop - 40),
                  behavior: "smooth",
                });
              }
            } else {
              el.classList.remove(
                "text-white",
                "bg-indigo-500/20",
                "border-indigo-400",
              );
              el.classList.add("border-transparent");
            }
          }
        });
      });

      function updateButtonState() {
        const hasText = markdownEl.value.trim().length > 0;
        btnGenerate.disabled = !hasText;
      }

      function clearText() {
        markdownEl.value = "";
        updateButtonState();
        hideResult();
      }

      let resultTimeout;

      function showResult() {
        clearTimeout(resultTimeout);
        resultSection.classList.remove("hidden");
        setTimeout(() => {
          resultSection.classList.remove("opacity-0", "translate-y-8");
          resultSection.classList.add("opacity-100", "translate-y-0");
        }, 10);
      }

      function hideResult() {
        clearTimeout(resultTimeout);
        resultSection.classList.add("opacity-0", "translate-y-8");
        resultSection.classList.remove("opacity-100", "translate-y-0");
        resultTimeout = setTimeout(() => {
          resultSection.classList.add("hidden");
        }, 500);
      }

      async function generateTTS() {
        const markdown = markdownEl.value.trim();
        if (!markdown) {
          statusEl.textContent = "⚠️ Veuillez saisir du texte.";
          statusEl.classList.replace("text-slate-500", "text-amber-500");
          setTimeout(() => {
            statusEl.textContent = "";
            statusEl.classList.replace("text-amber-500", "text-slate-500");
          }, 3000);
          return;
        }

        btnGenerate.disabled = true;
        btnText.textContent = "Génération...";
        btnSpinner.classList.remove("hidden");
        btnIcon.classList.add("hidden");

        statusEl.textContent = "Synthèse en cours...";
        statusEl.className = "text-sm font-medium text-indigo-500";

        hideResult();

        try {
          const response = await fetch("/synthesize", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ markdown }),
          });

          if (!response.ok) throw new Error(`Erreur ${response.status}`);

          const data = await response.json();

          const audioBlob = b64toBlob(data.audio_base64, "audio/mpeg");
          const audioUrl = URL.createObjectURL(audioBlob);
          audioPlayer.src = audioUrl;

          const dateStr = new Date().toISOString().slice(0, 10);
          downloadMp3.href = audioUrl;
          downloadMp3.download = `${dateStr}.mp3`;

          const vttBlob = new Blob([data.vtt], { type: "text/vtt" });
          const vttUrl = URL.createObjectURL(vttBlob);
          downloadVtt.href = vttUrl;
          downloadVtt.download = `${dateStr}.vtt`;
          renderVttAndSetupHighlighting(data.vtt);

          showResult();
          statusEl.textContent = "✓ Terminé avec succès";
          statusEl.className = "text-sm font-medium text-emerald-500";
        } catch (error) {
          console.error(error);
          statusEl.textContent = `Erreur: Serveur injoignable`;
          statusEl.className = "text-sm font-medium text-red-500";
        } finally {
          btnGenerate.disabled = false;
          btnText.textContent = "Générer";
          btnSpinner.classList.add("hidden");
          btnIcon.classList.remove("hidden");

          setTimeout(() => {
            if (statusEl.classList.contains("text-emerald-500")) {
              statusEl.textContent = "";
              statusEl.className =
                "text-sm font-medium text-slate-500 h-5 w-full sm:w-auto text-center sm:text-left transition-colors duration-300";
            }
          }, 4000);
        }
      }

      function b64toBlob(b64Data, contentType = "", sliceSize = 512) {
        const byteCharacters = atob(b64Data);
        const byteArrays = [];
        for (
          let offset = 0;
          offset < byteCharacters.length;
          offset += sliceSize
        ) {
          const slice = byteCharacters.slice(offset, offset + sliceSize);
          const byteNumbers = new Array(slice.length);
          for (let i = 0; i < slice.length; i++) {
            byteNumbers[i] = slice.charCodeAt(i);
          }
          const byteArray = new Uint8Array(byteNumbers);
          byteArrays.push(byteArray);
        }
        return new Blob(byteArrays, { type: contentType });
      }
    </script>
  </body>
</html>
