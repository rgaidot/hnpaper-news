name: Generate Audio

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regeneration of all audio'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: voxify -> target

      - name: Build voxify
        run: cargo build --release --manifest-path voxify/Cargo.toml

      - name: Generate Audio
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FLAGS="--force"
          fi
          bun run scripts/generate-audio.ts $FLAGS

      - name: Upload audio index to R2
        run: |
          aws s3 cp data/audio-index.json s3://${{ env.R2_BUCKET_NAME }}/audio/audio-index.json \
            --endpoint-url https://${{ env.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --region auto
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}

      - name: Commit audio index updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/audio-index.json || true
          git commit -m "chore(audio): update audio-index.json [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"
