name: Deploy Astro site to Pages

on:
  workflow_run:
    workflows: ["Generate Audio"]
    types:
      - completed
    branches:
      - main
  push:
    branches:
      - "feat/*"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
      PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
      PUBLIC_R2_URL: ${{ secrets.PUBLIC_R2_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Create data/audio directory for symlink
        run: mkdir -p data/audio

      - name: Download audio index from R2
        run: curl -s -o data/audio-index.json ${{ env.PUBLIC_R2_URL }}/audio/audio-index.json

      - name: Install, build, and upload your site
        uses: withastro/action@v2
        with:
          package-manager: bun

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
