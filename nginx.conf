load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;

worker_processes      auto;
worker_rlimit_nofile  65535;
error_log             /var/log/nginx/error.log warn;
pid                   /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  30;
    keepalive_requests 100;

    open_file_cache          max=1000 inactive=20s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_buffers 16 8k;
    gzip_types text/html text/css text/plain application/javascript
               application/json application/xml image/svg+xml;

    brotli on;
    brotli_static on;
    brotli_comp_level 6;
    brotli_min_length 1024;
    brotli_types text/html text/css text/plain application/javascript
                 application/json application/xml image/svg+xml;

    server {
        listen 4321;

        root  /usr/share/nginx/html;
        index index.html;

        add_header X-Content-Type-Options  "nosniff"                          always;
        add_header X-Frame-Options         "SAMEORIGIN"                       always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:;" always;

        etag on;

        error_page 404 /404.html;
        error_page 500 502 503 504 /500.html;

        location ~* \.(js|css|png|jpg|jpeg|webp|avif|svg|ico|woff2|woff)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.(mp3|mp4|ogg|m4a|webm)$ {
            add_header Accept-Ranges  bytes;
            add_header Cache-Control  "public, max-age=86400";
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            gzip   off;
            brotli off;
            limit_rate 500k;
            access_log off;
        }

        location ~* \.html$ {
            add_header Cache-Control "no-cache, must-revalidate";
            etag on;
        }

        location ~* \.json$ {
            add_header Cache-Control "no-cache, must-revalidate";
            add_header Content-Type  "application/json; charset=utf-8";
        }

        location / {
            try_files $uri $uri/ $uri.html =404;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
